<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibedita 💖</title>

<link rel="stylesheet" href="main.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- 🎬 CINEMATIC INTRO -->
<div id="intro">
  <h1 id="typing"></h1>
</div>

<!-- 💖 MAIN -->
<div id="main">

  <h1 class="title">For Nibedita 💖</h1>

  <!-- 🎥 SLIDESHOW -->
  <div class="slideshow">
    <img id="slide" src="images/r1.png">
  </div>

  <!-- 📖 FLIPBOOK -->
  <div class="flipbook">
    <div class="page">Happy Birthday 🎉</div>
    <div class="page">You are amazing 💖</div>
    <div class="page">Thank you for everything ✨</div>
    <div class="page">Stay happy always 😊</div>
  </div>

  <!-- 🎂 CAKE -->
  <div class="cake" onclick="blowCandle()">
    🎂
    <div id="flame">🔥</div>
  </div>

  <!-- 💌 MESSAGE -->
  <p class="message">
    Dear Nibedita 💖 <br><br>
    You are not just a friend, you are a beautiful part of my life 🌸 <br>
    May your life be filled with love, happiness and success ✨
  </p>

  <button onclick="startShow()">Start Celebration 🎉</button>

</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="music/setlove.mp3" type="audio/mpeg">
</audio>

<script src="main.js"></script>
</body>
</html>
