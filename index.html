<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Celebration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Background Video -->
    <div class="video-background">
        <video autoplay loop muted>
            <source src="background-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="content">
        <!-- Birthday Message -->
        <div class="message">
            <h1>🎉 Happy Birthday! 🎉</h1>
            <p>Wishing you the most joyful day of your life!</p>
        </div>

        <!-- Celebration Button -->
        <div class="celebrate-btn">
            <button onclick="celebrate()">🎈 Celebrate Now!</button>
        </div>

        <!-- Image Slider (Photos) -->
        <div class="slider">
            <div class="slides">
                <img src="image1.jpg" alt="Birthday Image 1">
                <img src="image2.jpg" alt="Birthday Image 2">
                <img src="image3.jpg" alt="Birthday Image 3">
                <img src="image4.jpg" alt="Birthday Image 4">
                <!-- More images here -->
            </div>
        </div>

        <!-- Balloons and Flower Animations -->
        <div id="balloon-container"></div>
        <div id="flower-container"></div>
    </div>

    <!-- Background Music -->
    <audio id="birthday-music" autoplay loop>
        <source src="happy_birthday_song.mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>

    <script src="script.js"></script>
</body>
</html>
