<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Nibedita 💖</title>

<link rel="stylesheet" href="main.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- 🎬 Netflix Intro -->
<div id="netflix">
  <h1>N</h1>
</div>

<!-- 💖 Typing Intro -->
<div id="intro">
  <h1 id="typing"></h1>
</div>

<!-- 🎉 MAIN -->
<div id="main">

  <h1 class="title">For Nibedita 💖</h1>

  <!-- 🎥 CINEMATIC ALBUM -->
  <div class="cinematic">
    <img id="cinema-img" src="images/r1.png">
    <div class="overlay"></div>
    <div id="caption"></div>
  </div>

  <!-- 🎂 CAKE -->
  <div class="cake" onclick="startMicBlow()">
    🎂
    <div id="flame">🔥</div>
  </div>

  <!-- 💌 MESSAGE -->
  <p class="message">
    Dear Nibedita 💖 <br><br>
    You are a beautiful part of my life 🌸 <br>
    Your smile, your kindness, your presence means everything ✨ <br><br>
    Happy Birthday 🎂💫
  </p>

  <button onclick="startShow()">Start Celebration 🎉</button>

</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="music/setlove.mp3" type="audio/mpeg">
</audio>

<script src="main.js"></script>

</body>
</html>
