<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibedita 💖</title>

<link rel="stylesheet" href="main.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="bg"></div>

<!-- 🎬 HERO -->
<section class="hero">
  <h1 class="title">Nibedita</h1>
  <p class="subtitle">A Story of Beautiful Moments 💖</p>
  <button onclick="startExperience()">Enter</button>
</section>

<!-- 🎥 CINEMATIC REEL -->
<section id="reel">

  <div class="frame">
    <img src="images/r1.png">
    <div class="text">Every moment with you feels magical ✨</div>
  </div>

  <div class="frame">
    <img src="images/r2.png">
    <div class="text">Your smile lights up everything 😊</div>
  </div>

  <div class="frame">
    <img src="images/r3.png">
    <div class="text">Memories I will always cherish 💫</div>
  </div>

  <div class="frame">
    <img src="images/r4.png">
    <div class="text">You are truly special 🌸</div>
  </div>

</section>

<!-- 🎂 FINAL SCREEN -->
<section class="final">
  <h2>Happy Birthday Nibedita 🎂💖</h2>
  <button onclick="celebrate()">Celebrate 🎉</button>
</section>

<audio id="music" loop>
  <source src="music/setlove.mp3">
</audio>

<script src="main.js"></script>

</body>
</html>
