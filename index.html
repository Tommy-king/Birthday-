<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Nibediata Kar (Rupa)!</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Video -->
    <div class="video-background">
        <video autoplay loop muted>
            <source src="background-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Main Content -->
    <div class="content">
        <!-- Birthday Message -->
        <div class="message">
            <h1>🎉 Happy Birthday Nibediata Kar (Rupa)! 🎉</h1>
            <p>Wishing you the most joyful day of your life! Enjoy your special day to the fullest!</p>
        </div>

        <!-- Image Slider (Photos) -->
        <div class="slider">
            <div class="slides">
                <img src="r1.png" alt="Birthday Image 1">
                <img src="r2.png" alt="Birthday Image 2">
                <img src="r3.png" alt="Birthday Image 3">
                <img src="r4.png" alt="Birthday Image 4">
                <!-- Add more images as needed -->
            </div>
        </div>
    </div>

    <!-- Stars and Circles (Celebration Effects) -->
    <div class="stars">
        <div class="star" style="--i: 1;"></div>
        <div class="star" style="--i: 2;"></div>
        <div class="star" style="--i: 3;"></div>
        <div class="star" style="--i: 4;"></div>
        <div class="star" style="--i: 5;"></div>
        <!-- Add more stars as needed -->
    </div>

    <div class="circles">
        <div class="circle" style="--i: 1;"></div>
        <div class="circle" style="--i: 2;"></div>
        <div class="circle" style="--i: 3;"></div>
        <div class="circle" style="--i: 4;"></div>
        <div class="circle" style="--i: 5;"></div>
        <!-- Add more circles as needed -->
    </div>

    <!-- Background Music -->
    <audio id="birthday-music" autoplay loop>
        <source src="happy_birthday_song.mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>

    <script src="script.js"></script>
</body>

</html>
